<script type="text/babel">

const { useState, useEffect, useMemo, useRef } = React;

/* =========================================================
   STORAGE
========================================================= */

if (!window.storage) {

  window.storage = {

    get(key) {

      try {

        return JSON.parse(
          localStorage.getItem(key)
        );

      } catch {

        return null;
      }
    },

    set(key, value) {

      localStorage.setItem(
        key,
        JSON.stringify(value)
      );
    }
  };
}

const STORAGE_KEY =
  "sg-household-finance-dashboard";

/* =========================================================
   HELPERS
========================================================= */

function currency(v = 0) {

  return new Intl.NumberFormat(
    "en-SG",
    {
      style: "currency",
      currency: "SGD",
      maximumFractionDigits: 0
    }
  ).format(v);
}

function monthLabel(date) {

  return new Date(date).toLocaleDateString(
    "en-SG",
    {
      month: "short",
      year: "numeric"
    }
  );
}

function extractAmount(text) {

  const match = text.match(
    /\$?\s?(\d+(?:,\d{3})*(?:\.\d+)?)/i
  );

  if (!match) return null;

  return parseFloat(
    match[1].replace(/,/g, "")
  );
}

function extractRate(text) {

  const match = text.match(
    /(\d+(\.\d+)?)\s?%/
  );

  return match
    ? parseFloat(match[1])
    : null;
}

function extractMonths(text) {

  const match = text.match(
    /(\d+)\s?(month|months|mth|mths)/i
  );

  return match
    ? parseInt(match[1])
    : null;
}

function addMonths(date, months) {

  const d = new Date(date);

  d.setMonth(d.getMonth() + months);

  return d.toISOString();
}

function daysRemaining(date) {

  return Math.ceil(
    (
      new Date(date) -
      new Date()
    ) /
      (1000 * 60 * 60 * 24)
  );
}

function currentMonthKey() {

  const d = new Date();

  return `${d.getFullYear()}-${d.getMonth()}`;
}

function inferCategory(text, learned) {

  const lower =
    text.toLowerCase();

  const patterns = {
    ...DEFAULT_PATTERNS
  };

  Object.keys(learned).forEach(key => {

    if (!patterns[key]) {
      patterns[key] = [];
    }

    patterns[key].push(
      ...learned[key]
    );
  });

  for (const category in patterns) {

    for (const keyword of patterns[category]) {

      if (
        lower.includes(
          keyword.toLowerCase()
        )
      ) {

        return category;
      }
    }
  }

  return "Others";
}

/* =========================================================
   DEFAULT DATA
========================================================= */

const defaultData = {

  expenses: [],
  incomes: [],
  investments: [],
  reminders: [],

  goals: {
    retirementAge: 40,
    retirementGoal: 3000000
  },

  learnedPatterns: {},

  messages: [
    {
      role: "assistant",
      content:
`Hi 👋

Try saying:

• husband salary $10000

/* =========================================================
   SIMPLE CHARTS
========================================================= */

function BarChart({
  data,
  color = "bg-orange-400"
}) {

  const max =
    Math.max(
      ...data.map(d => d.value),
      1
    );

  return (

    <div className="flex items-end gap-2 h-40">

      {data.map((item, i) => (

        <div
          key={i}
          className="flex-1 flex flex-col items-center justify-end"
        >

          <div
            className={`w-full rounded-t-2xl ${color}`}
            style={{
              height:
                (item.value / max) * 120 + "px"
            }}
          />

          <div className="text-[10px] text-neutral-500 mt-2">
            {item.label}
          </div>

        </div>
      ))}

    </div>
  );
}

function DonutChart({
  items
}) {

  const total =
    items.reduce(
      (a, b) => a + b.value,
      0
    ) || 1;

  let cumulative = 0;

  const colors = [
    "#fb923c",
    "#34d399",
    "#60a5fa",
    "#f472b6",
    "#a78bfa"
  ];

  const gradient =
    items
      .map((item, index) => {

        const start =
          (cumulative / total) * 360;

        cumulative += item.value;

        const end =
          (cumulative / total) * 360;

        return `${colors[index % colors.length]} ${start}deg ${end}deg`;

      })
      .join(",");

  return (

    <div className="flex items-center gap-5">

      <div
        className="w-36 h-36 rounded-full"
        style={{
          background:
            `conic-gradient(${gradient})`
        }}
      />

      <div className="space-y-2">

        {items.map((item, i) => (

          <div
            key={i}
            className="flex items-center gap-2 text-sm"
          >

            <div
              className="w-3 h-3 rounded-full"
              style={{
                background:
                  colors[i % colors.length]
              }}
            />

            <div>
              {item.label}
            </div>

          </div>
        ))}

      </div>

    </div>
  );
}

/* =========================================================
   APP
========================================================= */

function App() {

  const [data, setData] =
    useState(
      window.storage.get(
        STORAGE_KEY
      ) || defaultData
    );

  const [tab, setTab] =
    useState("dashboard");

  const [chatOpen, setChatOpen] =
    useState(false);

  const [input, setInput] =
    useState("");

  const [pending, setPending] =
    useState(null);

  const [followUp, setFollowUp] =
    useState(null);

  const [listening, setListening] =
    useState(false);

  const messageEndRef =
    useRef();

  useEffect(() => {

    window.storage.set(
      STORAGE_KEY,
      data
    );

  }, [data]);

  useEffect(() => {

    if (
      messageEndRef.current
    ) {

      messageEndRef.current.scrollIntoView({
        behavior: "smooth"
      });
    }

  }, [data.messages]);

  /* =========================================================
     CHAT HELPERS
  ========================================================= */

  function addAssistant(text) {

    setData(prev => ({
      ...prev,

      messages: [
        ...prev.messages,
        {
          role: "assistant",
          content: text
        }
      ]
    }));
  }

  function addUser(text) {

    setData(prev => ({
      ...prev,

      messages: [
        ...prev.messages,
        {
          role: "user",
          content: text
        }
      ]
    }));
  }

  /* =========================================================
     PARSER
  ========================================================= */

  function parseMessage(text) {

    const lower =
      text.toLowerCase();

    const amount =
      extractAmount(text);

    /* =====================================================
       CORRECTIONS
    ===================================================== */

    if (
      lower.includes("move") ||
      lower.includes("change")
    ) {

      const categoryMatch =
        text.match(
          /to\s(.+)/i
        );

      if (!categoryMatch) {

        addAssistant(
          "Which category would you like to move it to?"
        );

        return;
      }

      const newCategory =
        categoryMatch[1];

      const lastExpense =
        [...data.expenses]
          .reverse()
          .find(exp => {

            return lower.includes(
              exp.merchant.toLowerCase()
            );
          });

      if (lastExpense) {

        const updated =
          data.expenses.map(exp =>
            exp.id ===
            lastExpense.id
              ? {
                  ...exp,
                  category:
                    newCategory
                }
              : exp
          );

        setData(prev => ({
          ...prev,
          expenses: updated,

          learnedPatterns: {
            ...prev.learnedPatterns,

            [newCategory]: [
              ...(prev.learnedPatterns[
                newCategory
              ] || []),

              lastExpense.merchant.toLowerCase()
            ]
          }
        }));

        addAssistant(
          `Done ✨ Future '${lastExpense.merchant}' transactions will go to ${newCategory}.`
        );

        return;
      }
    }

    /* =====================================================
       EXPENSES
    ===================================================== */

    if (
      lower.includes("spent") ||
      lower.includes("paid") ||
      lower.includes("grab") ||
      lower.includes("ntuc") ||
      lower.includes("fairprice")
    ) {

      const merchantMatch =
        text.match(
          /at\s(.+)/i
        );

      const merchant =
        merchantMatch
          ? merchantMatch[1]
          : text;

      const category =
        inferCategory(
          text,
          data.learnedPatterns
        );

      if (
        category === "Others"
      ) {

        setFollowUp({
          type: "category",

          draft: {
            amount,
            merchant
          }
        });

        addAssistant(
          "I couldn't confidently categorise this.\n\nWhich category is it?\nGroceries / Food & Dining / Transport / Shopping / Healthcare / Kids / Parents / Utilities / Entertainment / Investment / Others"
        );

        return;
      }

      setPending({
        type: "expense",

        payload: {
          id: Date.now(),
          amount,
          merchant,
          category,
          date:
            new Date().toISOString()
        }
      });

      addAssistant(
`I understood:

Expense: ${currency(amount)}
Merchant: ${merchant}
Category: ${category}

Confirm save?`
      );

      return;
    }

    /* =====================================================
       SALARY / INCOME
    ===================================================== */

    if (
      lower.includes("salary") ||
      lower.includes("bonus") ||
      lower.includes("income")
    ) {

      const person =
        lower.includes("husband")
          ? "Husband"
          : "Me";

      const incomeType =
        lower.includes("bonus")
          ? "Bonus"
          : "Salary";

      setPending({
        type: "income",

        payload: {
          id: Date.now(),
          amount,
          person,
          incomeType,
          date:
            new Date().toISOString()
        }
      });

      addAssistant(
`I understood:

${person} ${incomeType}
Amount: ${currency(amount)}

Confirm save?`
      );

      return;
    }

    /* =====================================================
       INVESTMENTS
    ===================================================== */

    if (
      lower.includes("fd") ||
      lower.includes("ssb") ||
      lower.includes("t-bill")
    ) {

      let investmentType =
        "FD";

      if (
        lower.includes("ssb")
      ) {
        investmentType = "SSB";
      }

      if (
        lower.includes("t-bill")
      ) {
        investmentType =
          "T-Bill";
      }

      let institution =
        "Singapore";

      if (
        lower.includes("uob")
      ) institution = "UOB";

      if (
        lower.includes("dbs")
      ) institution = "DBS";

      if (
        lower.includes("ocbc")
      ) institution = "OCBC";

      if (
        lower.includes("maybank")
      ) institution = "Maybank";

      const rate =
        extractRate(text) || 3;

      const duration =
        extractMonths(text) || 6;

      const maturityDate =
        addMonths(
          new Date(),
          duration
        );

      const projected =
        amount *
        (rate / 100) *
        (duration / 12);

      setPending({
        type: "investment",

        payload: {
          id: Date.now(),

          investmentType,
          institution,

          amount,
          rate,
          duration,

          maturityDate,

          projectedInterest:
            projected,

          startDate:
            new Date().toISOString()
        }
      });

      addAssistant(
`I understood:

${investmentType}
Institution: ${institution}
Amount: ${currency(amount)}
Rate: ${rate}%
Duration: ${duration} months
Projected Interest: ${currency(projected)}

Confirm save?`
      );

      return;
    }

    /* =====================================================
       REMINDERS
    ===================================================== */

    if (
      lower.includes("remind")
    ) {

      setPending({
        type: "reminder",

        payload: {
          id: Date.now(),
          text,
          amount
        }
      });

      addAssistant(
`Recurring reminder:

${text}

Confirm save?`
      );

      return;
    }

    /* =====================================================
       GOALS
    ===================================================== */

    if (
      lower.includes("retire") ||
      lower.includes("goal")
    ) {

      const number =
        extractAmount(text) ||
        parseInt(
          text.match(/\d+/)?.[0]
        );

      if (
        lower.includes("million")
      ) {

        setPending({
          type: "goal",

          payload: {
            retirementGoal:
              number * 1000000
          }
        });

        addAssistant(
`Retirement goal:
${currency(number * 1000000)}

Confirm save?`
        );

        return;
      }

      setPending({
        type: "goal",

        payload: {
          retirementAge:
            number
        }
      });

      addAssistant(
`Retirement age target:
${number}

Confirm save?`
      );

      return;
    }

    /* =====================================================
       UNKNOWN
    ===================================================== */

    addAssistant(
`I couldn't understand that.

Try:
• spent $120 at NTUC
• husband salary $10000
• put $20000 in UOB FD at 3.2% for 6 months
• remind me to transfer $1700 to in laws every 18th`
    );
  }

  /* =========================================================
     SEND
  ========================================================= */

  function handleSend() {

    if (!input.trim()) return;

    addUser(input);

    if (followUp) {

      if (
        followUp.type ===
        "category"
      ) {

        setPending({
          type: "expense",

          payload: {
            id: Date.now(),
            amount:
              followUp.draft.amount,

            merchant:
              followUp.draft.merchant,

            category:
              input.trim(),

            date:
              new Date().toISOString()
          }
        });

        setFollowUp(null);

        addAssistant(
`I understood:

Expense: ${currency(followUp.draft.amount)}
Merchant: ${followUp.draft.merchant}
Category: ${input.trim()}

Confirm save?`
        );

        setInput("");

        return;
      }
    }

    parseMessage(input);

    setInput("");
  }

  /* =========================================================
     CONFIRM
  ========================================================= */

  function confirmSave() {

    if (!pending) return;

    const updated = {
      ...data
    };

    if (
      pending.type ===
      "expense"
    ) {

      updated.expenses.push(
        pending.payload
      );
    }

    if (
      pending.type ===
      "income"
    ) {

      updated.incomes.push(
        pending.payload
      );
    }

    if (
      pending.type ===
      "investment"
    ) {

      updated.investments.push(
        pending.payload
      );
    }

    if (
      pending.type ===
      "reminder"
    ) {

      updated.reminders.push(
        pending.payload
      );
    }

    if (
      pending.type ===
      "goal"
    ) {

      updated.goals = {
        ...updated.goals,
        ...pending.payload
      };
    }

    updated.messages.push({
      role: "assistant",
      content:
        "Saved successfully ✨"
    });

    setData(updated);

    setPending(null);

    setChatOpen(false);
  }

  /* =========================================================
     VOICE
  ========================================================= */

  function startVoice() {

    const SR =
      window.SpeechRecognition ||
      window.webkitSpeechRecognition;

    if (!SR) {

      alert(
        "Voice input not supported on this browser."
      );

      return;
    }

    const recognition =
      new SR();

    recognition.lang =
      "en-SG";

    recognition.onstart =
      () =>
        setListening(true);

    recognition.onend =
      () =>
        setListening(false);

    recognition.onresult =
      event => {

        setInput(
          event.results[0][0]
            .transcript
        );
      };

    recognition.start();
  }

  /* =========================================================
     CALCULATIONS
  ========================================================= */

  const totalIncome =
    data.incomes.reduce(
      (a, b) =>
        a + b.amount,
      0
    );

  const totalExpenses =
    data.expenses.reduce(
      (a, b) =>
        a + b.amount,
      0
    );

  const totalInvested =
    data.investments.reduce(
      (a, b) =>
        a + b.amount,
      0
    );

  const totalProjectedInterest =
    data.investments.reduce(
      (a, b) =>
        a +
        b.projectedInterest,
      0
    );

  const currentSavings =
    totalIncome -
    totalExpenses;

  const investmentInterest =
    data.investments.reduce(
      (a, inv) => {

        const monthly =
          inv.projectedInterest /
          inv.duration;

        return a + monthly;

      },
      0
    );

  const incomeBreakdown = [

    {
      label: "Salary",
      value:
        data.incomes
          .filter(
            i =>
              i.incomeType ===
              "Salary"
          )
          .reduce(
            (a, b) =>
              a + b.amount,
            0
          )
    },

    {
      label: "Investments",
      value:
        investmentInterest
    }
  ];

  const portfolioDistribution =
    Object.values(
      data.investments.reduce(
        (acc, inv) => {

          acc[
            inv.investmentType
          ] =
            (acc[
              inv.investmentType
            ] || 0) +
            inv.amount;

          return acc;

        },
        {}
      )
    );

  /* =========================================================
     MONTHLY CHARTS
  ========================================================= */

  const monthlyIncomeMap =
    {};

  const monthlyExpenseMap =
    {};

  data.incomes.forEach(i => {

    const key =
      monthLabel(i.date);

    monthlyIncomeMap[key] =
      (monthlyIncomeMap[
        key
      ] || 0) + i.amount;
  });

  data.expenses.forEach(e => {

    const key =
      monthLabel(e.date);

    monthlyExpenseMap[key] =
      (monthlyExpenseMap[
        key
      ] || 0) + e.amount;
  });

  const monthlyData =
    Object.keys({
      ...monthlyIncomeMap,
      ...monthlyExpenseMap
    }).map(key => ({

      label:
        key.split(" ")[0],

      income:
        monthlyIncomeMap[
          key
        ] || 0,

      expense:
        monthlyExpenseMap[
          key
        ] || 0,

      value:
        (monthlyIncomeMap[
          key
        ] || 0) -
        (monthlyExpenseMap[
          key
        ] || 0)
    }));

  /* =========================================================
     UI
  ========================================================= */

  return (

    <div className="min-h-screen bg-neutral-100 flex justify-center">

      <div className="w-full max-w-[430px] min-h-screen bg-gradient-to-b from-orange-50 via-white to-white pb-28">

        {/* =================================================
            HEADER
        ================================================= */}

        <div className="px-5 pt-6 pb-4">

          <div className="flex items-center justify-between">

            <div>

              <div className="text-sm text-neutral-500">
                Household Finance
              </div>

              <div className="text-2xl font-bold text-neutral-800">
                Good Evening ✨
              </div>

            </div>

            <div className="bg-orange-100 text-orange-700 px-3 py-2 rounded-2xl text-sm font-semibold">
              Singapore
            </div>

          </div>

        </div>

        {/* =================================================
            CONTENT
        ================================================= */}

        <div className="px-4 space-y-4">

          {/* DASHBOARD */}

          {tab === "dashboard" && (
            <>

              <div className="bg-gradient-to-r from-orange-400 via-pink-400 to-orange-500 rounded-[28px] p-6 text-white shadow-lg">

                <div className="text-4xl font-bold">
                  {currency(currentSavings)}
                </div>

                <div className="mt-2 text-orange-50">
                  Current Savings
                </div>

              </div>

              <div className="grid grid-cols-2 gap-3">

                <div className="bg-white rounded-3xl p-5 shadow-sm">

                  <div className="text-sm text-neutral-500">
                    Income
                  </div>

                  <div className="text-2xl font-bold mt-2">
                    {currency(totalIncome)}
                  </div>

                </div>

                <div className="bg-white rounded-3xl p-5 shadow-sm">

                  <div className="text-sm text-neutral-500">
                    Expenses
                  </div>

                  <div className="text-2xl font-bold mt-2">
                    {currency(totalExpenses)}
                  </div>

                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold">
                  Monthly Net Cash Flow
                </div>

                <div className="mt-6">
                  <BarChart
                    data={monthlyData}
                  />
                </div>

              </div>

            </>
          )}

          {/* INCOME */}

          {tab === "income" && (
            <>

              <div className="bg-gradient-to-r from-emerald-400 to-teal-500 rounded-[28px] p-6 text-white shadow-lg">

                <div className="text-4xl font-bold">
                  {currency(totalIncome)}
                </div>

                <div className="mt-2">
                  Total Income YTD
                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold">
                  Income Breakdown
                </div>

                <div className="mt-6">
                  <DonutChart
                    items={incomeBreakdown}
                  />
                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold mb-5">
                  Monthly Income
                </div>

                <BarChart
                  data={
                    monthlyData.map(
                      d => ({
                        label:
                          d.label,
                        value:
                          d.income
                      })
                    )
                  }
                  color="bg-emerald-400"
                />

              </div>

            </>
          )}

          {/* CASH FLOW */}

          {tab === "cashflow" && (
            <>

              <div className="bg-gradient-to-r from-blue-400 to-indigo-500 rounded-[28px] p-6 text-white shadow-lg">

                <div className="text-lg">
                  This Month
                </div>

                <div className="mt-4 space-y-2">

                  <div>
                    Earned {currency(totalIncome)}
                  </div>

                  <div>
                    Spent {currency(totalExpenses)}
                  </div>

                  <div className="font-bold text-2xl">
                    Saved {currency(currentSavings)}
                  </div>

                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold">
                  6 Month Trend
                </div>

                <div className="mt-6">
                  <BarChart
                    data={monthlyData}
                    color="bg-blue-400"
                  />
                </div>

              </div>

            </>
          )}

          {/* INVESTMENTS */}

          {tab === "investments" && (
            <>

              <div className="bg-gradient-to-r from-purple-400 to-pink-500 rounded-[28px] p-6 text-white shadow-lg">

                <div className="text-4xl font-bold">
                  {currency(totalInvested)}
                </div>

                <div className="mt-2">
                  Total Portfolio
                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold">
                  Portfolio Distribution
                </div>

                <div className="mt-6">

                  <DonutChart
                    items={
                      Object.entries(
                        data.investments.reduce(
                          (
                            acc,
                            inv
                          ) => {

                            acc[
                              inv.investmentType
                            ] =
                              (acc[
                                inv.investmentType
                              ] ||
                                0) +
                              inv.amount;

                            return acc;

                          },
                          {}
                        )
                      ).map(
                        ([k, v]) => ({
                          label:
                            k,
                          value:
                            v
                        })
                      )
                    }
                  />

                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="font-semibold">
                  Returns
                </div>

                <div className="mt-4 space-y-3">

                  <div className="flex justify-between">
                    <span>Total Invested</span>
                    <span className="font-bold">
                      {currency(totalInvested)}
                    </span>
                  </div>

                  <div className="flex justify-between">
                    <span>Projected Interest</span>
                    <span className="font-bold text-emerald-600">
                      {currency(totalProjectedInterest)}
                    </span>
                  </div>

                </div>

              </div>

              <div className="space-y-3">

                {data.investments.map(
                  inv => {

                    const days =
                      daysRemaining(
                        inv.maturityDate
                      );

                    return (

                      <div
                        key={inv.id}
                        className="bg-white rounded-3xl p-5 shadow-sm"
                      >

                        <div className="flex justify-between">

                          <div>

                            <div className="font-bold">
                              {inv.institution}
                            </div>

                            <div className="text-sm text-neutral-500">
                              {inv.investmentType}
                            </div>

                          </div>

                          <div className="text-right">

                            <div className="font-bold">
                              {currency(inv.amount)}
                            </div>

                            <div className="text-sm text-emerald-600">
                              {inv.rate}%
                            </div>

                          </div>

                        </div>

                        <div className="mt-4 text-sm text-neutral-500">
                          Matures in {days} days
                        </div>

                        {days <= 30 && (

                          <div className="mt-3 bg-orange-100 text-orange-700 rounded-2xl px-3 py-2 text-sm">

                            Your investment matures in {days} days.
                            Current best rates:
                            SSB ~3.0%, FD ~3.2%, T-Bill ~3.1%
                          </div>
                        )}

                      </div>
                    );
                  }
                )}

              </div>

            </>
          )}

          {/* GOALS */}

          {tab === "goals" && (
            <>

              <div className="bg-gradient-to-r from-pink-400 to-rose-500 rounded-[28px] p-6 text-white shadow-lg">

                <div className="text-4xl font-bold">
                  {data.goals.retirementAge}
                </div>

                <div className="mt-2">
                  Retirement Age Goal
                </div>

              </div>

              <div className="bg-white rounded-3xl p-5 shadow-sm">

                <div className="text-sm text-neutral-500">
                  Target Nest Egg
                </div>

                <div className="text-3xl font-bold mt-2">
                  {currency(
                    data.goals.retirementGoal
                  )}
                </div>

              </div>

            </>
          )}

          {/* REMINDERS */}

          {tab === "reminders" && (
            <>

              <div className="space-y-3">

                {data.reminders.map(
                  item => (

                    <div
                      key={item.id}
                      className="bg-white rounded-3xl p-5 shadow-sm"
                    >

                      <div className="font-semibold">
                        {item.text}
                      </div>

                    </div>
                  )
                )}

              </div>

            </>
          )}

        </div>

        {/* =================================================
            BOTTOM NAV
        ================================================= */}

        <div className="fixed bottom-0 left-0 right-0 flex justify-center">

          <div className="w-full max-w-[430px] bg-white border-t border-neutral-200 px-2 py-2 flex justify-around">

            {[
              ["dashboard","🏠","Dashboard"],
              ["income","💵","Income"],
              ["cashflow","📊","Cash Flow"],
              ["investments","💰","Investments"],
              ["goals","🎯","Goals"],
              ["reminders","🔔","Reminders"]
            ].map(
              item => (

                <button
                  key={item[0]}
                  onClick={() =>
                    setTab(item[0])
                  }
                  className={`flex flex-col items-center gap-1 px-2 py-2 ${
                    tab === item[0]
                      ? "text-orange-500"
                      : "text-neutral-400"
                  }`}
                >

                  <div>
                    {item[1]}
                  </div>

                  <div className="text-[10px]">
                    {item[2]}
                  </div>

                </button>
              )
            )}

          </div>

        </div>

        {/* =================================================
            FLOATING CHAT BUTTON
        ================================================= */}

        <button
          onClick={() =>
            setChatOpen(true)
          }
          className="fixed bottom-24 right-4 w-16 h-16 rounded-full bg-orange-500 text-white shadow-2xl text-2xl flex items-center justify-center"
        >
          💬
        </button>

        {/* =================================================
            CHAT OVERLAY
        ================================================= */}

        {chatOpen && (

          <div className="fixed inset-0 bg-black/40 flex justify-center items-end z-50">

            <div className="w-full max-w-[430px] bg-white rounded-t-[32px] overflow-hidden">

              <div className="p-4 border-b border-neutral-100 flex justify-between items-center">

                <div className="font-semibold">
                  Finance Assistant
                </div>

                <button
                  onClick={() =>
                    setChatOpen(false)
                  }
                  className="text-2xl text-neutral-400"
                >
                  ×
                </button>

              </div>

              <div className="h-[420px] overflow-y-auto p-4 space-y-3 hide-scrollbar">

                {data.messages.map(
                  (msg, i) => (

                    <div
                      key={i}
                      className={`flex ${
                        msg.role === "user"
                          ? "justify-end"
                          : "justify-start"
                      }`}
                    >

                      <div
                        className={`max-w-[82%] rounded-3xl px-4 py-3 whitespace-pre-line text-sm ${
                          msg.role === "user"
                            ? "bg-orange-500 text-white"
                            : "bg-neutral-100 text-neutral-800"
                        }`}
                      >
                        {msg.content}
                      </div>

                    </div>
                  )
                )}

                <div ref={messageEndRef}></div>

              </div>

              {pending && (

                <div className="px-4 pb-3">

                  <button
                    onClick={confirmSave}
                    className="w-full bg-emerald-500 text-white rounded-2xl py-3 font-semibold"
                  >
                    Confirm & Save
                  </button>

                </div>
              )}

              <div className="border-t border-neutral-100 p-3 flex gap-2">

                <button
                  onClick={startVoice}
                  className={`w-11 h-11 rounded-2xl flex items-center justify-center ${
                    listening
                      ? "bg-red-500 text-white"
                      : "bg-orange-100 text-orange-700"
                  }`}
                >
                  🎤
                </button>

                <input
                  value={input}
                  onChange={e =>
                    setInput(
                      e.target.value
                    )
                  }
                  placeholder="Tell me what happened..."
                  className="flex-1 bg-neutral-100 rounded-2xl px-4 py-3 outline-none"
                />

                <button
                  onClick={handleSend}
                  className="w-11 h-11 rounded-2xl bg-orange-500 text-white"
                >
                  ➤
                </button>

              </div>

            </div>

          </div>
        )}

      </div>

    </div>
  );
}

const root =
  ReactDOM.createRoot(
    document.getElementById("root")
  );

root.render(<App />);

</script>

</body>
</html>
